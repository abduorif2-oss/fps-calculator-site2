<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<meta name="description"
content="FPS Calculator Pro CPU GPU RAM va o'yin FPS hisoblovchi sayt">

<meta name="keywords"
content="FPS Calculator GPU CPU Gaming PC FPS">

<title>FPS Calculator Ultra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#000428,#004e92,#0f2027);
background-size:300% 300%;
animation:bg 10s infinite;
color:white;
padding:30px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
max-width:1100px;
margin:auto;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:25px;
backdrop-filter:blur(12px);
}

h1{
text-align:center;
color:cyan;
font-size:45px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
}

select{
width:100%;
padding:14px;
margin:8px 0;
background:#182030;
border:none;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:16px;
margin-top:20px;
background:linear-gradient(90deg,cyan,blue);
border:none;
border-radius:15px;
font-size:18px;
color:white;
cursor:pointer;
}

.result{
margin-top:25px;
padding:25px;
border-radius:20px;
background:rgba(0,255,255,0.1);
text-align:center;
font-size:24px;
}

.parts{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.part{
background:rgba(255,255,255,0.05);
padding:18px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="box">

<h1>🎮 FPS Calculator Ultra</h1>

<div class="grid">

<div class="card">
<h3>CPU</h3>
<select id="cpu"></select>

<h3>GPU</h3>
<select id="gpu"></select>

<h3>RAM</h3>
<select id="ram">
<option>8</option>
<option>16</option>
<option>32</option>
<option>64</option>
</select>
</div>

<div class="card">

<h3>O'yin</h3>
<select id="game"></select>

<h3>Grafika</h3>
<select id="quality">
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Ultra</option>
</select>

<h3>Ekran</h3>
<select id="res">
<option>1080p</option>
<option>1440p</option>
<option>4K</option>
</select>

</div>

</div>

<button onclick="hisobla()">FPS HISOBLASH</button>

<div id="natija" class="result">Natija shu yerda</div>

<div class="parts">
<div class="part">CPU → Hisoblash</div>
<div class="part">GPU → FPS</div>
<div class="part">RAM → Tezlik</div>
<div class="part">SSD → Yuklash</div>
</div>

</div>

<script>

const cpus={
"Intel Celeron":30,
"Intel Pentium":40,
"i3 10100":60,
"i5 10400F":90,
"i5 12400F":110,
"i5 13600K":150,
"i7 12700K":170,
"i7 14700K":190,
"i9 14900K":220,
"Ryzen 5 5600":100,
"Ryzen 7 5800X":150,
"Ryzen 7 7800X3D":220,
"Ryzen 9 7950X3D":250
}

const gpus={
"GTX1050Ti":40,
"GTX1650":70,
"RTX2060":100,
"RTX3060":150,
"RTX4060":180,
"RTX4070":230,
"RTX4080":280,
"RTX4090":360,
"RX6600":140,
"RX7800XT":250
}

const games={

"CS 1.6":80,
"Counter Strike Source":70,
"CSGO":60,
"CS2":50,

"Valorant":70,
"Fortnite":-10,
"PUBG":-20,
"Warzone":-50,
"Apex Legends":-10,

"GTA 3":90,
"GTA Vice City":90,
"GTA San Andreas":80,
"GTA 4":30,
"GTA 5":0,
"GTA 6 (leaked)":-90,

"Minecraft":50,
"Minecraft RTX":-30,
"Roblox":80,

"Resident Evil 2":-20,
"Resident Evil 3":-20,
"Resident Evil 4":-30,
"Resident Evil 5":-10,
"Resident Evil 6":-10,
"Resident Evil 7":-30,
"Resident Evil Village":-40,

"Cyberpunk 2077":-80,
"Red Dead Redemption 2":-60,
"Elden Ring":-40,
"Hogwarts Legacy":-50,
"Starfield":-70,

"Forza Horizon 5":-30,
"Need for Speed Heat":-10,
"Need for Speed Unbound":-20,

"FIFA 25":20,
"EA FC 25":20,

"Dota 2":60,
"League Of Legends":70,
"World of Tanks":30,
"World of Warcraft":20,

"Rainbow Six Siege":30,
"Battlefield 5":-20,
"Battlefield 2042":-60,

"Rust":-40,
"DayZ":-50,
"ARK Survival":-60,
"Valheim":40,

"Overwatch 2":40,
"Rocket League":80,

"Fall Guys":90,
"Among Us":100,

"Terraria":90,
"Stardew Valley":120,

"Dead by Daylight":-20,
"Phasmophobia":-30,

"Escape from Tarkov":-80,
"Helldivers 2":-60,

"Assassin's Creed Valhalla":-70,
"Watch Dogs 2":-20,
"Far Cry 6":-50,

"Skyrim":60

}

for(let x in cpus)
cpu.innerHTML+=`<option>${x}</option>`

for(let x in gpus)
gpu.innerHTML+=`<option>${x}</option>`

for(let x in games)
game.innerHTML+=`<option>${x}</option>`

function hisobla(){

let fps=
cpus[cpu.value]+
gpus[gpu.value]+
games[game.value]

if(ram.value==32) fps+=15
if(ram.value==64) fps+=25

if(quality.value=="High") fps-=25
if(quality.value=="Ultra") fps-=60

if(res.value=="1440p") fps-=35
if(res.value=="4K") fps-=80

fps=Math.max(25,fps)

natija.innerHTML=
`🔥 ${fps} FPS<br><br>
🎮 ${game.value}<br>
🖥 ${cpu.value}<br>
🎨 ${gpu.value}<br>
⚡ ${ram.value}GB RAM`
}

</script>

</body>
</html>
